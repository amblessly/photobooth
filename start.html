<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Snapcrate — Get Started</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./src/main.css">
<script type="module" src="./src/start.js"></script>
</head>
<body data-theme="cute" class="landing-body">

  <div class="bg-decor" id="bgDecor" aria-hidden="true"></div>

  <main class="landing-main">
    <section class="landing-card">
      <a class="landing-back" href="./index.html" aria-label="Back to home">
        <svg viewBox="0 0 24 24" width="16" height="16"><path d="M15 6l-6 6 6 6" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Back
      </a>

      <span class="brand-mark landing-mark" aria-hidden="true">
        <svg viewBox="0 0 48 48" width="48" height="48">
          <rect x="4" y="10" width="40" height="30" rx="8" fill="var(--accent)"/>
          <circle cx="24" cy="25" r="9" fill="var(--cream)"/>
          <circle cx="24" cy="25" r="5" fill="var(--ink)"/>
          <rect x="16" y="6" width="10" height="7" rx="3" fill="var(--accent)"/>
          <circle cx="36" cy="17" r="2.3" fill="var(--mint)"/>
        </svg>
      </span>

      <h1 class="landing-title">Almost there!</h1>
      <p class="landing-sub">Pick a name so we can personalize your photobooth session.</p>

      <form class="landing-form" id="usernameForm" novalidate>
        <label class="landing-label" for="usernameInput">What should we call you?</label>
        <input
          type="text"
          id="usernameInput"
          class="landing-input"
          placeholder="e.g. sunny_bear"
          autocomplete="off"
          maxlength="24"
          spellcheck="false"
          required
        />
        <span class="landing-error" id="usernameError" hidden>Please enter a username to continue.</span>

        <button class="btn btn-primary btn-lg landing-btn" id="startBtn" type="submit">
          Enter photobooth
          <svg viewBox="0 0 24 24" width="18" height="18"><path d="M9 6l6 6-6 6" stroke="currentColor" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </form>

      <p class="landing-note">No sign-up needed — just a name to personalize your session.</p>
    </section>
  </main>

</body>
</html>
